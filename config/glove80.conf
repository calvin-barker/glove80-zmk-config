# Mouse/pointing emulation. The Layout Editor writes this when you enable
# HID_POINTING under Advanced Configuration; the keymap's mouse layers,
# &mmv/&msc/&mkp behaviors, and input listeners require it.
CONFIG_ZMK_POINTING=y

# Agent status keys: the firmware fork needs to know which layer arms
# the jump keys (LAYER_Agents in glove80.keymap)
CONFIG_ZMK_AGENT_STATUS_LAYER=20
